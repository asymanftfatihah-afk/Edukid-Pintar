    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Bubbler One', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        .bounce-soft {
            animation: bounceSoft 3s infinite ease-in-out;
        }
        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .float-cloud {
            animation: floatCloud 20s infinite linear;
        }
        @keyframes floatCloud {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
        .spin-slow {
            animation: spinSlow 12s infinite linear;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-star {
            animation: pulseStar 1.5s infinite ease-in-out;
        }
        @keyframes pulseStar {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        /* Tema Warna Dinamik */
        .tema-pelangi { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); }
        .tema-laut { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%); }
        .tema-hutan { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }
        .tema-angkasa { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); color: white; }
        
        /* Elemen melompat apabila disentuh */
        .jump-active {
            animation: jumpEffect 0.5s ease-out;
        }
        @keyframes jumpEffect {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.9) translateY(-40px); }
        }
    </style>
</head>

            firebase.initializeApp(firebaseConfig);

        let masaMula = Date.now();
        let logAktiviti = {};
        let targetMatematik = 0;

        setInterval(() => {
            // Mengira masa aktif bermain
            let bezaMasa = Math.floor((Date.now() - masaMula) / 1000);
            let minit = Math.floor(bezaMasa / 60);
            let saat = bezaMasa % 60;
            document.getElementById('txtMasaBermain').innerText = `${minit} minit ${saat} saat`;
            
            // Hantar kemajuan ke Firebase secara berkala jika ada sambungan
            if (database) {
                database.ref('analitik_sesi/bermain').set({
                    durasi_saat: bezaMasa,
                    kategori_diterokai: Object.keys(logAktiviti),
                    kemaskini_terakhir: new Date().toISOString()
                });
            }
        }, 1000);

        function catatAktiviti(kategori) {
            logAktiviti[kategori] = (logAktiviti[kategori] || 0) + 1;
        }

        function bukaDashboard() {
            document.getElementById('modalParents').classList.remove('hidden');
            document.getElementById('parentsGate').classList.remove('hidden');
            document.getElementById('parentsData').classList.add('hidden');
            document.getElementById('jawapanGate').value = '';

            // Bina soalan matematik rawak
            let num1 = Math.floor(Math.random() * 5) + 2;
            let num2 = Math.floor(Math.random() * 4) + 1;
            targetMatematik = num1 + num2;
            document.getElementById('soalanMatematik').innerText = `Berapakah ${num1} + ${num2}?`;
        }

        function sahkanParentsGate() {
            let jawapan = parseInt(document.getElementById('jawapanGate').value);
            if (jawapan === targetMatematik) {
                document.getElementById('parentsGate').classList.add('hidden');
                document.getElementById('parentsData').classList.remove('hidden');

                // Papar aktiviti terpilih
                let list = document.getElementById('listKategori');
                list.innerHTML = '';
                let keys = Object.keys(logAktiviti);
                if(keys.length === 0) {
                    list.innerHTML = '<li>Belum ada kategori dimainkan lagi.</li>';
                } else {
                    keys.forEach(k => {
                        list.innerHTML += `<li class="capitalize">${k} (${logAktiviti[k]} kali)</li>`;
                    });
                }

                // Jana cadangan pintar
                let cadangan = "Kanak-kanak sedang aktif meneroka! Cuba luangkan masa bersamanya meneka nama objek di persekitaran rumah untuk mengukuhkan memori pendengarannya.";

                sebutSuara("Salah, cuba lagi ibu bapa.");
                alert("Jawapan salah! Sila cuba lagi.");

            if ('speechSynthesis' in window) {

                let sebutan = new SpeechSynthesisUtterance(teks);
                sebutan.lang = 'ms-MY'; // Set Bahasa Melayu
                sebutan.rate = 0.9;     // Kelajuan perlahan sedikit untuk kefahaman budak 2 tahun
                sebutan.pitch = 1.2;    // Nada sedikit tinggi agar kedengaran ceria
                window.speechSynthesis.speak(sebutan);

                { teks: "Mangga", visual: "🥭" },
                { teks: "Oren", visual: "🍊" }
            ],
            kenderaan: [
                { teks: "Kereta", visual: "🚗", bunyi: "Vroom vroom!" },
                { teks: "Bas", visual: "🚌", bunyi: "Pon pon!" },
                { teks: "Bomba", visual: "🚒", bunyi: "Nee nor nee nor!" },
                { teks: "Ambulans", visual: "🚑", bunyi: "Wiu wiu wiu!" },
                { teks: "Kapal Terbang", visual: "✈️", bunyi: "Swoosh!" },
                { teks: "Kereta Api", visual: "🚂", bunyi: "Choo choo!" }
            ],
            keluarga: [
                { teks: "Ayah", visual: "👨" },
                { teks: "Ibu", visual: "👩" },
                { teks: "Adik", visual: "👶" },
                { teks: "Abang", visual: "👦" },
                { teks: "Kakak", visual: "👧" },
                { teks: "Datuk", visual: "👴" },
                { teks: "Nenek", visual: "👵" }
            ]
        };

        function tukarSkrin(idSkrin) {
            document.getElementById('skrinUtama').classList.add('hidden');
            document.getElementById('menuPembelajaran').classList.add('hidden');
            document.getElementById('skrinModPermainan').classList.add('hidden');

            document.getElementById(idSkrin).classList.remove('hidden');
            
            if(idSkrin === 'menuPembelajaran') {
                sebutSuara("Jom pilih permainan!");
            }
        }

        function kembaliKeMenu() {
            tukarSkrin('menuPembelajaran');
            matikanModKhas();
        }

        function bukaMod(kategori) {
            modSemasa = kategori;
            indeksSemasa = 0;
            catatAktiviti(kategori);
            
            document.getElementById('skrinMenuUtama')?.classList.add('hidden'); 
            tukarSkrin('skrinModPermainan');
            
            // Set butang navigasi kiri kanan lalai paparan
            document.getElementById('navigasiMod').classList.remove('hidden');
            document.getElementById('butangSeterusnyaPangil').classList.remove('hidden');

            setupButangNavigasi();
            binaKandunganMod();
        }

        function setupButangNavigasi() {
            const btnKiri = document.getElementById('btnKiri');
            const btnKanan = document.getElementById('btnKanan');

            btnKiri.onclick = () => {
                if (indeksSemasa > 0) {
                    indeksSemasa--;
                    binaKandunganMod();
                }
            };

            btnKanan.onclick = () => {
                // Bergantung pada saiz bank data
                let max = dataPembelajaran[modSemasa] ? dataPembelajaran[modSemasa].length : 1;
                if (indeksSemasa < max - 1) {
                    indeksSemasa++;
                    binaKandunganMod();
                } else {
                    bagiPujianRawak();
                    kembaliKeMenu();
                }
            };
        }

        function binaKandunganMod() {
            const area = document.getElementById('kandunganMod');
            area.innerHTML = '';
            
            // Mengendalikan Mod Pembelajaran Standard (Nombor, Huruf, Bentuk, Haiwan, Buah, Kenderaan, Keluarga)
            if (dataPembelajaran[modSemasa]) {
                let item = dataPembelajaran[modSemasa][indeksSemasa];
                
                let tajukTeks = item.teksMS || item.teks;
                sebutSuara(tajukTeks);

                let subElemen = item.sub ? `<div class="text-3xl tracking-widest mt-6">${item.sub}</div>` : '';
                let labelBunyi = item.bunyi ? `<div class="text-sm text-gray-400 mt-2 font-mono">${item.bunyi}</div>` : '';

                area.innerHTML = `
                    <div onclick="responElemenSentuh(this, '${item.teks}', '${item.bunyi || ''}')" class="cursor-pointer p-8 rounded-full bg-white shadow-md hover:shadow-xl inline-block transform transition active:scale-95">
                        <div class="text-8xl md:text-9xl bounce-soft select-none">${item.visual}</div>
                    </div>
                    <h3 class="text-4xl font-black text-slate-700 mt-6">${item.teks}</h3>
                    ${subElemen}
                    ${labelBunyi}
                `;
            } 
            // Mod Interaktif Khas 1: WARNA
            else if (modSemasa === 'warna') {
                document.getElementById('butangSeterusnyaPangil').classList.add('hidden');
                
                const senaraiWarna = [
                    { nama: "Merah", hex: "#ef4444" },
                    { nama: "Biru", hex: "#3b82f6" },
                    { nama: "Hijau", hex: "#22c55e" },
                    { nama: "Kuning", hex: "#eab308" },
                    { nama: "Putih", hex: "#ffffff", border: "border-2 border-gray-300" },
                    { nama: "Hitam", hex: "#1e293b" },
                    { nama: "Ungu", hex: "#a855f7" },
                    { nama: "Oren", hex: "#f97316" }
                ];
                
                // Pilih satu warna sasaran rawak
                let warnaSasaran = senaraiWarna[Math.floor(Math.random() * senaraiWarna.length)];
                sebutSuara(`Sentuh warna ${warnaSasaran.nama}`);

                area.innerHTML = `
                    <h3 class="text-3xl font-black text-slate-700 mb-6">Sentuh warna <span class="text-indigo-600 underline">${warnaSasaran.nama}</span></h3>
                    <div class="grid grid-cols-4 gap-4 w-full max-w-md">
                        ${senaraiWarna.map(w => `
                            <button onclick="semakJawapanWarna('${w.nama}', '${warnaSasaran.nama}')" class="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl shadow-md cursor-pointer ${w.border || ''} transform active:scale-90 transition-transform" style="background-color: ${w.hex}"></button>
                        `).join('')}
                    </div>
                `;
            }
            // Mod Interaktif Khas 2: TEKA BUNYI
            else if (modSemasa === 'bunyi') {
                document.getElementById('butangSeterusnyaPangil').classList.add('hidden');
                
                const senaraiBunyi = [
                    { nama: "Kucing", ikon: "🐱", bunyiSebutan: "Bunyi Meow Meow. Yang mana satu kucing?" },
                    { nama: "Anjing", ikon: "🐶", bunyiSebutan: "Bunyi Guk Guk. Yang mana satu anjing?" },
                    { nama: "Lembu", ikon: "🐮", bunyiSebutan: "Bunyi Mooo. Yang mana satu lembu?" },
                    { nama: "Ayam", ikon: "🐔", bunyiSebutan: "Bunyi Kok kok keeok. Yang mana satu ayam?" },
                    { nama: "Kereta Api", ikon: "🚂", bunyiSebutan: "Bunyi Choo choo! Yang mana satu kereta api?" },
                    { nama: "Ambulans", ikon: "🚑", bunyiSebutan: "Bunyi Wiu wiu wiu. Yang mana satu ambulans?" }
                ];

                let sasaran = senaraiBunyi[Math.floor(Math.random() * senaraiBunyi.length)];
                sebutSuara(sasaran.bunyiSebutan);

                // Ambil 2 pengacau rawak
                let senaraiPilihan = [sasaran];
                while(senaraiPilihan.length < 3) {
                    let rawak = senaraiBunyi[Math.floor(Math.random() * senaraiBunyi.length)];
                    if(!senaraiPilihan.find(p => p.nama === rawak.nama)) {
                        senaraiPilihan.push(rawak);
                    }
                }
                // Susun semula rawak (Shuffle)
                senaraiPilihan.sort(() => Math.random() - 0.5);

                area.innerHTML = `
                    <h3 class="text-2xl font-black text-slate-700 mb-8">Dengar dan Teka Gambar Sesuai 🌟</h3>
                    <div class="flex justify-center gap-6">
                        ${senaraiPilihan.map(p => `
                            <button onclick="semakJawapanBunyi('${p.nama}', '${sasaran.nama}')" class="bg-amber-100 border-4 border-white shadow-xl w-24 h-24 rounded-3xl text-5xl flex items-center justify-center transform active:scale-90 transition cursor-pointer">
                                ${p.ikon}
                            </button>
                        `).join('')}
                    </div>
                    <button onclick="sebutSuara('${sasaran.bunyiSebutan}')" class="mt-8 bg-sky-400 text-white font-bold py-2 px-6 rounded-full text-sm shadow">🗣️ Main Semula Bunyi</button>
                `;
            }
            // Mod Interaktif Khas 3: TEPUK & SENTUH (CANVAS GAMEPLAY)
            else if (modSemasa === 'tepuk') {
                document.getElementById('navigasiMod').classList.add('hidden');
                sebutSuara("Tepuk dan pecahkan buih sabun di skrin!");
                
                area.innerHTML = `
                    <div class="absolute inset-0 bg-sky-50/50 rounded-3xl overflow-hidden cursor-crosshair">
                        <canvas id="gameCanvas" class="w-full h-full"></canvas>
                        <button onclick="kembaliKeMenu()" class="absolute top-4 left-4 bg-gray-600/80 text-white font-bold py-2 px-4 rounded-xl text-sm z-50">
                            <i class="fa-solid fa-home"></i> Keluar
                        </button>
                        <div class="absolute bottom-4 right-4 text-xs font-bold text-slate-400 pointer-events-none">Sentuh buih untuk meletup!</div>
                    </div>
                `;
                mulakanGameTepukBuih();
            }
        }

        function responElemenSentuh(el, teks, kesanBunyi) {
            el.classList.add('jump-active');
            setTimeout(() => el.classList.remove('jump-active'), 500);

            cetusZarahGanjaran();

            if (kesanBunyi) {
                sebutSuara(`${teks}. Bunyinya... ${kesanBunyi}`);
            } else {
                sebutSuara(teks);
            }
        }

        function semakJawapanWarna(pilihan, betul) {
            if (pilihan === betul) {
                bagiPujianRawak();
                setTimeout(() => binaKandunganMod(), 1500);
            } else {
                sebutSuara("Cuba lagi sayang.");
            }
        }

        function semakJawapanBunyi(pilihan, betul) {
            if (pilihan === betul) {
                bagiPujianRawak();
                setTimeout(() => binaKandunganMod(), 1500);
            } else {
                sebutSuara("Bukan yang itu, cuba lagi.");
            }
        }


        // --- LOGIK GAMEPLAY CANVAS (TEPUK BUIH SABUN) ---
        let gameLoopId = null;
        function mulakanGameTepukBuih() {
            const canvas = document.getElementById('gameCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // Set saiz canvas mengikut resolusi elemen induk
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width || 600;
            canvas.height = rect.height || 400;

            let buihList = [];

            class Buih {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 50;
                    this.radius = Math.random() * 25 + 25; // Bersaiz besar untuk budak kecil
                    this.speed = Math.random() * 1.5 + 0.5;
                    this.color = `hsla(${Math.random() * 360}, 80%, 70%, 0.6)`;
                }
                update() {
                    this.y -= this.speed;
                    if(this.y + this.radius < 0) {
                        this.y = canvas.height + this.radius;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#ffffff';
                    ctx.stroke();
                    
                    // Kilauan buih
                    ctx.beginPath();
                    ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.fill();
                }
            }

            for(let i=0; i<8; i++) {
                buihList.push(new Buih());
            }

            function lariLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                buihList.forEach(b => {
                    b.update();
                    b.draw();
                });
                gameLoopId = requestAnimationFrame(lariLoop);
            }
            gameLoopId = requestAnimationFrame(lariLoop);

            // Handler sentuhan/klik untuk meletupkan buih
            canvas.addEventListener('click', function(e) {
                const cRect = canvas.getBoundingClientRect();
                const klikX = e.clientX - cRect.left;
                const klikY = e.clientY - cRect.top;

                buihList.forEach((b, indeks) => {
                    let jarak = Math.hypot(b.x - klikX, b.y - klikY);
                    if(jarak < b.radius) {
                        // Buih pecah!
                        buihList[indeks] = new Buih(); // Ganti buih baru
                        sebutSuara("Pop!");
                        cetusZarahGanjaran(e.clientX, e.clientY);
                    }
                });
            });
        }

        function matikanModKhas() {
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
        }


        // --- EFEK SISTEM ZARAH KANVAS (CONFETTI GANJARAN) ---
        const canvasGanjaran = document.getElementById('rewardCanvas');
        const ctxGanjaran = canvasGanjaran.getContext('2d');
        let senaraiZarah = [];

        function setSaizCanvasGanjaran() {
            canvasGanjaran.width = window.innerWidth;
            canvasGanjaran.height = window.innerHeight;
        }
        window.addEventListener('resize', setSaizCanvasGanjaran);
        setSaizCanvasGanjaran();

        class Zarah {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 12 + 6;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -6 - 2;
                this.gravity = 0.15;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.alpha = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.015;
            }
            draw() {
                ctxGanjaran.save();
                ctxGanjaran.globalAlpha = this.alpha;
                ctxGanjaran.fillStyle = this.color;
                ctxGanjaran.beginPath();
                // Lukis bintang mudah atau segi empat kecil konfeti
                ctxGanjaran.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxGanjaran.fill();
                ctxGanjaran.restore();
            }
        }

        function cetusZarahGanjaran(x, y) {
            let pX = x || window.innerWidth / 2;
            let pY = y || window.innerHeight / 2;
            
            for(let i=0; i<30; i++) {
                senaraiZarah.push(new Zarah(pX, pY));
            }
        }

        function updateAnimasiZarah() {
            ctxGanjaran.clearRect(0, 0, canvasGanjaran.width, canvasGanjaran.height);
            senaraiZarah.forEach((z, indeks) => {
                z.update();
                z.draw();
                if(z.alpha <= 0) {
                    senaraiZarah.splice(indeks, 1);
                }
            });
            requestAnimationFrame(updateAnimasiZarah);
        }
        requestAnimationFrame(updateAnimasiZarah);

    </script>
