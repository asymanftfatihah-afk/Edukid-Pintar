<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edukids - Learn & Play</title>
    <!-- Tailwind CSS for Cheerful UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome for Cute Cartoon Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase App & Database (V9 Compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        .bounce-soft {
            animation: bounceSoft 3s infinite ease-in-out;
        }
        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .float-cloud {
            animation: floatCloud 20s infinite linear;
        }
        @keyframes floatCloud {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
        .spin-slow {
            animation: spinSlow 12s infinite linear;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-star {
            animation: pulseStar 1.5s infinite ease-in-out;
        }
        @keyframes pulseStar {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        .theme-rainbow { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); }
        .theme-ocean { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%); }
        .theme-forest { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }
        .theme-space { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); color: white; }
        
        .jump-active {
            animation: jumpEffect 0.5s ease-out;
        }
        @keyframes jumpEffect {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.9) translateY(-40px); }
        }
    </style>
</head>
<body class="theme-rainbow min-h-screen relative flex flex-col justify-between transition-all duration-500 overflow-hidden">

    <!-- Reward Particle Canvas -->
    <canvas id="rewardCanvas" class="absolute inset-0 pointer-events-none z-50"></canvas>

    <!-- MAIN DISPLAY SCREEN -->
    <main class="flex-grow flex items-center justify-center p-4 w-full relative">

        <!-- 1. MAIN MENU SCREEN -->
        <div id="mainScreen" class="text-center w-full max-w-xl">
            <div class="absolute top-10 left-1/4 opacity-30 float-cloud pointer-events-none">
                <i class="fa-solid fa-cloud text-6xl text-white"></i>
            </div>
            <div class="absolute top-8 right-10 text-yellow-400 text-5xl spin-slow pointer-events-none">
                <i class="fa-solid fa-sun text-yellow-400"></i>
            </div>
            
            <div class="space-y-8">
                <div class="bounce-soft inline-block">
                    <h1 class="text-5xl md:text-6xl font-black text-amber-500 drop-shadow-lg tracking-wide">
                        🌈 Edukids
                    </h1>
                    <p class="text-xl font-bold text-sky-600 mt-2">Listen, Learn & Play! 🌟🐾</p>
                </div>

                <div class="flex justify-center gap-4 text-amber-400 text-3xl pulse-star">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star text-4xl text-pink-400"></i>
                    <i class="fa-solid fa-star"></i>
                </div>

                <button onclick="changeScreen('learningMenu')" class="w-72 h-72 mx-auto bg-emerald-400 hover:bg-emerald-500 text-white rounded-full font-black text-4xl shadow-2xl border-8 border-white flex flex-col items-center justify-center cursor-pointer transition transform active:scale-95 duration-200">
                    <i class="fa-solid fa-play text-6xl mb-3 drop-shadow"></i>
                    <span>PLAY</span>
                </button>
            </div>
        </div>

        <!-- 2. GAME SELECTION MENU -->
        <div id="learningMenu" class="hidden w-full max-w-4xl mx-auto">

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <button onclick="openMode('numbers')" class="bg-rose-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🔢</span> Numbers
                </button>
                <button onclick="openMode('alphabet')" class="bg-sky-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🔤</span> Alphabet
                </button>
                <button onclick="openMode('colors')" class="bg-amber-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🎨</span> Colors
                </button>
                <button onclick="openMode('shapes')" class="bg-purple-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🔺</span> Shapes
                </button>
                <button onclick="openMode('animals')" class="bg-teal-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🐶</span> Animals
                </button>
                <button onclick="openMode('fruits')" class="bg-orange-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🍎</span> Fruits
                </button>
                <button onclick="openMode('vehicles')" class="bg-indigo-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">🚗</span> Vehicles
                </button>
                <button onclick="openMode('family')" class="bg-pink-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer">
                    <span class="text-5xl">👨‍👩‍👧</span> Family
                </button>
                <button onclick="openMode('bubbles')" class="bg-lime-400 p-6 rounded-3xl text-white font-black text-xl shadow-lg border-4 border-white flex flex-col items-center gap-3 transform active:scale-95 transition cursor-pointer col-span-2 md:col-span-4">
                    <span class="text-5xl">👏</span> Pop Bubbles Game
                </button>
            </div>
        </div>

        <!-- PLAY MODAL DISPLAY CONTAINER -->
        <div id="gameModeScreen" class="hidden w-full max-w-3xl mx-auto bg-white/80 backdrop-blur-md rounded-3xl p-6 shadow-2xl border-4 border-white min-h-[450px] flex flex-col justify-between items-center relative">
            <div id="modeContent" class="w-full flex-grow flex flex-col items-center justify-center text-center"></div>

            <!-- Lower Navigation Bar -->
            <div id="modeNavigation" class="w-full flex justify-between items-center mt-6 pt-4 border-t border-gray-200">
                <button onclick="backToMenu()" class="bg-gray-400 text-white font-bold py-3 px-6 rounded-2xl shadow active:scale-95 cursor-pointer">
                    <i class="fa-solid fa-home mr-2"></i> Menu
                </button>
                <div id="navButtonsContainer" class="flex gap-2">
                    <button id="btnLeft" class="bg-indigo-400 text-white font-bold p-4 rounded-2xl shadow active:scale-95 text-xl cursor-pointer">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <button id="btnRight" class="bg-indigo-400 text-white font-bold p-4 rounded-2xl shadow active:scale-95 text-xl cursor-pointer">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. PARENTS DASHBOARD -->
        <div id="parentsModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border-4 border-amber-400 relative">
                <div id="parentsGate">
                    <h3 class="text-2xl font-black text-amber-600 mb-4 text-center">Parents Zone 🔐</h3>
                    <p class="text-gray-600 text-sm mb-4 text-center">Solve this simple question to enter:</p>
                    <div class="bg-amber-50 p-4 rounded-2xl text-center font-bold text-xl mb-4 text-gray-700" id="mathQuestion"></div>
                    <input type="number" id="gateAnswer" class="w-full border-2 border-amber-300 p-3 rounded-xl text-center text-xl mb-4 font-bold outline-none focus:border-amber-500" placeholder="Your answer">
                    <div class="flex gap-2">
                        <button onclick="closeDashboard()" class="w-1/2 bg-gray-400 text-white py-3 rounded-xl font-bold cursor-pointer">Cancel</button>
                        <button onclick="verifyParentsGate()" class="w-1/2 bg-amber-500 text-white py-3 rounded-xl font-bold cursor-pointer">Enter</button>
                    </div>
                </div>

                <div id="parentsData" class="hidden space-y-4 text-gray-800">
                    <h3 class="text-2xl font-black text-indigo-600 border-b pb-2">Edukids Performance Report</h3>
                    <div>
                        <p class="font-bold text-gray-500 text-sm uppercase">⏱️ Playtime This Session</p>
                        <p id="txtPlaytime" class="text-3xl font-black text-emerald-500">0 minutes 0 seconds</p>
                    </div>
                    <div>
                        <p class="font-bold text-gray-500 text-sm uppercase">📊 Explored Categories</p>
                        <ul id="categoryList" class="list-disc list-inside mt-1 font-semibold text-gray-700"></ul>
                    </div>
                    <button onclick="closeDashboard()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-center cursor-pointer mt-4">Close Report</button>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER THEMING CONTROLS -->
    <footer class="p-4 flex justify-between items-center w-full z-40 bg-white/20 backdrop-blur-xs">
        <div class="flex gap-2 bg-white/60 p-2 rounded-2xl shadow-md">
            <button onclick="changeTheme('rainbow')" class="w-8 h-8 rounded-full bg-gradient-to-r from-pink-300 to-sky-300 border border-white cursor-pointer transform active:scale-95"></button>
            <button onclick="changeTheme('ocean')" class="w-8 h-8 rounded-full bg-sky-400 border border-white cursor-pointer transform active:scale-95"></button>
            <button onclick="changeTheme('forest')" class="w-8 h-8 rounded-full bg-emerald-400 border border-white cursor-pointer transform active:scale-95"></button>
            <button onclick="changeTheme('space')" class="w-8 h-8 rounded-full bg-indigo-950 border border-white cursor-pointer transform active:scale-95"></button>
        </div>

        <button onclick="openDashboard()" class="bg-amber-400 hover:bg-amber-500 text-white font-black py-2 px-4 rounded-2xl shadow border-2 border-white flex items-center gap-2 text-sm cursor-pointer transition transform active:scale-95">
            <i class="fa-solid fa-user-lock"></i> Parents
        </button>
    </footer>

    <!-- ENGINE CODE -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEnIM_ZN5qeHAS-6I8bTcQumTTRla_keA",
            authDomain: "edukids-pintar-c382f.firebaseapp.com",
            databaseURL: "https://edukids-pintar-c382f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edukids-pintar-c382f",
            storageBucket: "edukids-pintar-c382f.firebasestorage.app",
            messagingSenderId: "787682994225",
            appId: "1:787682994225:web:ca20eea9008a9054b90d10"
        };
        
        let database = null;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
        } catch (e) {
            console.warn("Firebase fallback initialized.");
        }

        // --- PLAY TIME AND TRACKING SYSTEMS ---
        let startTime = Date.now();
        let activityLog = {};
        let targetMathAnswer = 0;

        setInterval(() => {
            let timeDiff = Math.floor((Date.now() - startTime) / 1000);
            let minutes = Math.floor(timeDiff / 60);
            let seconds = timeDiff % 60;
            document.getElementById('txtPlaytime').innerText = `${minutes} minutes ${seconds} seconds`;
        }, 1000);

        function logActivity(category) {
            activityLog[category] = (activityLog[category] || 0) + 1;
        }

        function openDashboard() {
            document.getElementById('parentsModal').classList.remove('hidden');
            document.getElementById('parentsGate').classList.remove('hidden');
            document.getElementById('parentsData').classList.add('hidden');
            document.getElementById('gateAnswer').value = '';

            let num1 = Math.floor(Math.random() * 5) + 2;
            let num2 = Math.floor(Math.random() * 4) + 1;
            targetMathAnswer = num1 + num2;
            document.getElementById('mathQuestion').innerText = `What is ${num1} + ${num2}?`;
        }

        function verifyParentsGate() {
            let answer = parseInt(document.getElementById('gateAnswer').value);
            if (answer === targetMathAnswer) {
                document.getElementById('parentsGate').classList.add('hidden');
                document.getElementById('parentsData').classList.remove('hidden');

                let list = document.getElementById('categoryList');
                list.innerHTML = '';
                let keys = Object.keys(activityLog);
                if(keys.length === 0) {
                    list.innerHTML = '<li>No category explored yet.</li>';
                } else {
                    keys.forEach(k => {
                        list.innerHTML += `<li class="capitalize">${k} (${activityLog[k]} times)</li>`;
                    });
                }
            } else {
                speakEnglish("Wrong answer. Try again.");
            }
        }

        function closeDashboard() {
            document.getElementById('parentsModal').classList.add('hidden');
        }

        function changeTheme(theme) {
            document.body.className = `theme-${theme} min-h-screen relative flex flex-col justify-between transition-all duration-500 overflow-hidden`;
        }

        // --- ENGLISH AUDIO ENGINES (WEB SPEECH & REAL SOUND INTEGRATION) ---
        let currentAudio = null;

        function playRealSound(url, fallbackText) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            // First speak the name of the animal/vehicle clearly
            speakEnglish(fallbackText);
            
            // Then overlay the real sound after a very short delay
            setTimeout(() => {
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => {
                    console.log("Audio stream blocked or failed, using Voice text fallback instead.");
                });
            }, 800);
        }

        function speakEnglish(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.3;
                window.speechSynthesis.speak(utterance);
            }
        }

        const praiseList = ["Great job!", "Wonderful!", "Awesome!", "You did it!", "Smart baby!"];
        function giveRandomPraise() {
            let index = Math.floor(Math.random() * praiseList.length);
            speakEnglish(praiseList[index]);
            triggerRewardParticles();
        }

        // --- MODULE LEARNING DATA BANK ---
        // Sound URLs updated to highly reliable, permanent open-source direct .mp3 repositories
        const learningData = {
            numbers: [
                { text: "One", visual: "1️⃣", sub: "🍎" },
                { text: "Two", visual: "2️⃣", sub: "🍎🍎" },
                { text: "Three", visual: "3️⃣", sub: "🍎🍎🍎" },
                { text: "Four", visual: "4️⃣", sub: "🍌🍌🍌🍌" },
                { text: "Five", visual: "5️⃣", sub: "🍌🍌🍌🍌🍌" },
                { text: "Six", visual: "6️⃣", sub: "🍇🍇🍇🍇🍇🍇" },
                { text: "Seven", visual: "7️⃣", sub: "🍇🍇🍇🍇🍇🍇🍇" },
                { text: "Eight", visual: "8️⃣", sub: "🍊🍊🍊🍊🍊🍊🍊🍊" },
                { text: "Nine", visual: "9️⃣", sub: "🍊🍊🍊🍊🍊🍊🍊🍊🍊" },
                { text: "Ten", visual: "🔟", sub: "⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️" }
            ],
            alphabet: [
                { text: "A for Apple", visual: "A", sub: "🍎" },
                { text: "B for Ball", visual: "B", sub: "⚽" },
                { text: "C for Cat", visual: "C", sub: "🐱" },
                { text: "D for Dog", visual: "D", sub: "🐶" },
                { text: "E for Elephant", visual: "E", sub: "🐘" },
                { text: "F for Fish", visual: "F", sub: "🐟" },
                { text: "G for Grapes", visual: "G", sub: "🍇" },
                { text: "H for House", visual: "H", sub: "🏠" },
                { text: "I for Ice cream", visual: "I", sub: "🍦" },
                { text: "J for Juice", visual: "J", sub: "🧃" },
                { text: "K for Kite", visual: "K", sub: "🪁" },
                { text: "L for Lion", visual: "L", sub: "🦁" },
                { text: "M for Monkey", visual: "M", sub: "🐵" },
                { text: "N for Nest", visual: "N", sub: "🪹" },
                { text: "O for Orange", visual: "O", sub: "🍊" },
                { text: "P for Pen", visual: "P", sub: "🖊️" },
                { text: "Q for Queen", visual: "Q", sub: "👑" },
                { text: "R for Rabbit", visual: "R", sub: "🐇" },
                { text: "S for Sun", visual: "S", sub: "☀️" },
                { text: "T for Train", visual: "T", sub: "🚂" },
                { text: "U for Umbrella", visual: "U", sub: "☂️" },
                { text: "V for Van", visual: "V", sub: "🚐" },
                { text: "W for Water", visual: "W", sub: "💧" },
                { text: "X for Xylophone", visual: "X", sub: "🎹" },
                { text: "Y for Yo-yo", visual: "Y", sub: "🪀" },
                { text: "Z for Zebra", visual: "Z", sub: "🦓" }
            ],
            shapes: [
                { text: "Circle", visual: "⚪" },
                { text: "Square", visual: "⬜" },
                { text: "Triangle", visual: "🔺" },
                { text: "Star", visual: "⭐" },
                { text: "Heart", visual: "❤️" }
            ],
            animals: [
                { text: "Cat", visual: "🐱", realSound: "https://actions.google.com/sounds/v1/animals/cat_meow.ogg" },
                { text: "Dog", visual: "🐶", realSound: "https://actions.google.com/sounds/v1/animals/dog_barking.ogg" },
                { text: "Cow", visual: "🐮", realSound: "https://actions.google.com/sounds/v1/animals/cow_moo.ogg" },
                { text: "Chicken", visual: "🐔", realSound: "https://actions.google.com/sounds/v1/animals/rooster_crow.ogg" },
                { text: "Elephant", visual: "🐘", realSound: "https://actions.google.com/sounds/v1/animals/elephant_trumpet.ogg" },
                { text: "Lion", visual: "🦁", realSound: "https://actions.google.com/sounds/v1/animals/lion_growl.ogg" }
            ],
            fruits: [
                { text: "Apple", visual: "🍎" },
                { text: "Banana", visual: "🍌" },
                { text: "Watermelon", visual: "🍉" },
                { text: "Grapes", visual: "🍇" },
                { text: "Mango", visual: "🥭" },
                { text: "Orange", visual: "🍊" }
            ],
            vehicles: [
                { text: "Car", visual: "🚗", realSound: "https://actions.google.com/sounds/v1/transportation/car_horn.ogg" },
                { text: "Train", visual: "🚂", realSound: "https://actions.google.com/sounds/v1/transportation/train_whistle.ogg" },
                { text: "Airplane", visual: "✈️", realSound: "https://actions.google.com/sounds/v1/transportation/airplane_flyby.ogg" }
            ],
            family: [
                { text: "Father", visual: "👨" },
                { text: "Mother", visual: "👩" },
                { text: "Baby", visual: "👶" },
                { text: "Brother", visual: "👦" },
                { text: "Sister", visual: "👧" }
            ]
        };

        let currentMode = '';
        let currentIndex = 0;

        function changeScreen(screenId) {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('learningMenu').classList.add('hidden');
            document.getElementById('gameModeScreen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'learningMenu') {
                speakEnglish("Let's pick a game!");
            }
        }

        function backToMenu() {
            changeScreen('learningMenu');
            disableSpecialMode();
        }

        function openMode(category) {
            currentMode = category;
            currentIndex = 0;
            logActivity(category);
            
            changeScreen('gameModeScreen');
            document.getElementById('modeNavigation').classList.remove('hidden');
            document.getElementById('navButtonsContainer').classList.remove('hidden');

            setupNavigationButtons();
            buildModeContent();
        }

        function setupNavigationButtons() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');

            btnLeft.onclick = () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    buildModeContent();
                }
            };

            btnRight.onclick = () => {
                let max = learningData[currentMode] ? learningData[currentMode].length : 1;
                if (currentIndex < max - 1) {
                    currentIndex++;
                    buildModeContent();
                } else {
                    giveRandomPraise();
                    setTimeout(() => backToMenu(), 1200);
                }
            };
        }

        function buildModeContent() {
            const area = document.getElementById('modeContent');
            area.innerHTML = '';
            
            if (learningData[currentMode]) {
                let item = learningData[currentMode][currentIndex];
                let subElement = item.sub ? `<div class="text-4xl tracking-widest mt-6">${item.sub}</div>` : '';
                
                if (item.realSound) {
                    playRealSound(item.realSound, item.text);
                } else {
                    speakEnglish(item.text);
                }

                area.innerHTML = `
                    <div onclick="touchResponse(this, ${item.realSound ? `'${item.realSound}'` : 'null'}, '${item.text}')" class="cursor-pointer p-8 rounded-full bg-white shadow-md hover:shadow-xl inline-block transform transition active:scale-95">
                        <div class="text-8xl md:text-9xl bounce-soft select-none">${item.visual}</div>
                    </div>
                    <h3 class="text-5xl font-black text-slate-700 mt-6">${item.text}</h3>
                    ${subElement}
                    <p class="text-sm font-bold text-teal-600 mt-3">👉 Tap image to play sound again!</p>
                `;
            } 
            else if (currentMode === 'colors') {
                document.getElementById('navButtonsContainer').classList.add('hidden');
                const colorsList = [
                    { name: "Red", hex: "#ef4444" },
                    { name: "Blue", hex: "#3b82f6" },
                    { name: "Green", hex: "#22c55e" },
                    { name: "Yellow", hex: "#eab308" },
                    { name: "Purple", hex: "#a855f7" },
                    { name: "Orange", hex: "#f97316" }
                ];
                
                let targetColor = colorsList[Math.floor(Math.random() * colorsList.length)];
                speakEnglish(`Touch the color ${targetColor.name}`);

                area.innerHTML = `
                    <h3 class="text-3xl font-black text-slate-700 mb-6">Touch the color: <span class="text-indigo-600 underline">${targetColor.name}</span></h3>
                    <div class="grid grid-cols-3 gap-6 w-full max-w-md">
                        ${colorsList.map(c => `
                            <button onclick="checkColor('${c.name}', '${targetColor.name}')" class="w-24 h-24 rounded-3xl shadow-lg cursor-pointer transform active:scale-90 transition-transform" style="background-color: ${c.hex}"></button>
                        `).join('')}
                    </div>
                `;
            }
            else if (currentMode === 'bubbles') {
                document.getElementById('modeNavigation').classList.add('hidden');
                speakEnglish("Tap and pop the bubbles!");
                area.innerHTML = `
                    <div class="absolute inset-0 bg-sky-50/50 rounded-3xl overflow-hidden cursor-crosshair">
                        <canvas id="gameCanvas" class="w-full h-full"></canvas>
                        <button onclick="backToMenu()" class="absolute top-4 left-4 bg-gray-600/80 text-white font-bold py-2 px-4 rounded-xl text-sm z-50">🛑 Leave</button>
                    </div>
                `;
                startBubbleGame();
            }
        }

        function touchResponse(el, realSoundUrl, englishText) {
            el.classList.add('jump-active');
            setTimeout(() => el.classList.remove('jump-active'), 500);
            triggerRewardParticles();
            
            if(realSoundUrl) {
                playRealSound(realSoundUrl, englishText);
            } else {
                speakEnglish(englishText);
            }
        }

        function checkColor(choice, correct) {
            if (choice === correct) {
                giveRandomPraise();
                setTimeout(() => buildModeContent(), 1500);
            } else {
                speakEnglish("Try again!");
            }
        }

        // --- BUBBLE POPPING CANVAS GAME ---
        let gameLoopId = null;
        function startBubbleGame() {
            const canvas = document.getElementById('gameCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width || 600;
            canvas.height = rect.height || 400;

            let bubbleList = [];
            class Bubble {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 50;
                    this.radius = Math.random() * 20 + 30;
                    this.speed = Math.random() * 2 + 1;
                    this.color = `hsla(${Math.random() * 360}, 80%, 70%, 0.6)`;
                }
                update() {
                    this.y -= this.speed;
                    if(this.y + this.radius < 0) {
                        this.y = canvas.height + this.radius;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ffffff';
                    ctx.stroke();
                }
            }

            for(let i=0; i<6; i++) bubbleList.push(new Bubble());

            function runLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                bubbleList.forEach(b => { b.update(); b.draw(); });
                gameLoopId = requestAnimationFrame(runLoop);
            }
            gameLoopId = requestAnimationFrame(runLoop);

            canvas.addEventListener('click', function(e) {
                const cRect = canvas.getBoundingClientRect();
                const clickX = e.clientX - cRect.left;
                const clickY = e.clientY - cRect.top;

                bubbleList.forEach((b, index) => {
                    let dist = Math.hypot(b.x - clickX, b.y - clickY);
                    if(dist < b.radius) {
                        bubbleList[index] = new Bubble();
                        speakEnglish("Pop!");
                        triggerRewardParticles(e.clientX, e.clientY);
                    }
                });
            });
        }

        function disableSpecialMode() {
            if(gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
            if(currentAudio) { currentAudio.pause(); }
        }

        // --- PARTICLE REWARD ENGINE ---
        const rewardCanvas = document.getElementById('rewardCanvas');
        const ctxReward = rewardCanvas.getContext('2d');
        let particleList = [];

        function setRewardCanvasSize() {
            rewardCanvas.width = window.innerWidth;
            rewardCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setRewardCanvasSize);
        setRewardCanvasSize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 10 + 6;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -6 - 2;
                this.gravity = 0.2;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.alpha = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }
            draw() {
                ctxReward.save();
                ctxReward.globalAlpha = this.alpha;
                ctxReward.fillStyle = this.color;
                ctxReward.beginPath();
                ctxReward.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxReward.fill();
                ctxReward.restore();
            }
        }

        function triggerRewardParticles(x, y) {
            let pX = x || window.innerWidth / 2;
            let pY = y || window.innerHeight / 2;
            for(let i=0; i<25; i++) particleList.push(new Particle(pX, pY));
        }

        function updateParticleAnimation() {
            ctxReward.clearRect(0, 0, rewardCanvas.width, rewardCanvas.height);
            particleList.forEach((p, index) => {
                p.update();
                p.draw();
                if(p.alpha <= 0) particleList.splice(index, 1);
            });
            requestAnimationFrame(updateParticleAnimation);
        }
        requestAnimationFrame(updateParticleAnimation);
    </script>
</body>
</html>
