<!DOCTYPE html>

    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        .bounce-soft {
            animation: bounceSoft 3s infinite ease-in-out;
        }
        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .float-cloud {
            animation: floatCloud 20s infinite linear;
        }
        @keyframes floatCloud {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
        .spin-slow {
            animation: spinSlow 12s infinite linear;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-star {
            animation: pulseStar 1.5s infinite ease-in-out;
        }
        @keyframes pulseStar {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        .tema-pelangi { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); }
        .tema-laut { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%); }
        .tema-hutan { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }
        .tema-angkasa { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); color: white; }
        
        .jump-active {
            animation: jumpEffect 0.5s ease-out;
        }
        @keyframes jumpEffect {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.9) translateY(-40px); }
        }
    </style>
</head>

                    <button onclick="tutupDashboard()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-center cursor-pointer mt-4">Tutup Laporan</button>

            <button onclick="tukarTema('pelangi')" class="w-8 h-8 rounded-full bg-gradient-to-r from-pink-300 to-sky-300 border border-white cursor-pointer transform active:scale-95"></button>

    <!-- LOGIK SISTEM APLIKASI -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEnIM_ZN5qeHAS-6I8bTcQumTTRla_keA",
            authDomain: "edukids-pintar-c382f.firebaseapp.com",
            databaseURL: "https://edukids-pintar-c382f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edukids-pintar-c382f",
            storageBucket: "edukids-pintar-c382f.firebasestorage.app",
            messagingSenderId: "787682994225",
            appId: "1:787682994225:web:ca20eea9008a9054b90d10"
        };
        
        let database = null;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
        } catch (e) {
            console.warn("Firebase fallback diaktifkan.", e);
        }

        // --- SISTEM PEMANTAUAN MASA ---
        let masaMula = Date.now();
        let logAktiviti = {};
        let targetMatematik = 0;

        setInterval(() => {
            let bezaMasa = Math.floor((Date.now() - masaMula) / 1000);
            let minit = Math.floor(bezaMasa / 60);
            let saat = bezaMasa % 60;
            document.getElementById('txtMasaBermain').innerText = `${minit} minit ${saat} saat`;
        }, 1000);

        function catatAktiviti(kategori) {
            logAktiviti[kategori] = (logAktiviti[kategori] || 0) + 1;
        }

        function bukaDashboard() {
            document.getElementById('modalParents').classList.remove('hidden');
            document.getElementById('parentsGate').classList.remove('hidden');
            document.getElementById('parentsData').classList.add('hidden');
            document.getElementById('jawapanGate').value = '';

            let num1 = Math.floor(Math.random() * 5) + 2;
            let num2 = Math.floor(Math.random() * 4) + 1;
            targetMatematik = num1 + num2;
            document.getElementById('soalanMatematik').innerText = `Berapakah ${num1} + ${num2}?`;
        }

        function sahkanParentsGate() {
            let jawapan = parseInt(document.getElementById('jawapanGate').value);
            if (jawapan === targetMatematik) {
                document.getElementById('parentsGate').classList.add('hidden');
                document.getElementById('parentsData').classList.remove('hidden');

                let list = document.getElementById('listKategori');
                list.innerHTML = '';
                let keys = Object.keys(logAktiviti);
                if(keys.length === 0) {
                    list.innerHTML = '<li>Belum ada kategori dimainkan.</li>';
                } else {
                    keys.forEach(k => {
                        list.innerHTML += `<li class="capitalize">${k} (${logAktiviti[k]} kali)</li>`;
                    });
                }
            } else {
                alert("Jawapan salah! Sila cuba lagi.");
            }
        }

        function tutupDashboard() {
            document.getElementById('modalParents').classList.add('hidden');
        }

        function tukarTema(tema) {
            document.body.className = `tema-${tema} min-h-screen relative flex flex-col justify-between transition-all duration-500 overflow-hidden`;
        }

        let audioSemasa = null;
        function mainkanBunyiSebenar(url) {
            if (audioSemasa) {
                audioSemasa.pause();
                audioSemasa.currentTime = 0;
            }
            audioSemasa = new Audio(url);
            audioSemasa.play().catch(e => console.log("Audio disekat, perlukan interaksi pengguna."));
        }

        // --- DATA PEMBELAJARAN LENGKAP ---
        const dataPembelajaran = {
            nombor: [
                { teks: "Satu", visual: "1️⃣", sub: "🍎" },

            ],

        };

        let modSemasa = '';
        let indeksSemasa = 0;

        function tukarSkrin(idSkrin) {
            document.getElementById('skrinUtama').classList.add('hidden');
            document.getElementById('menuPembelajaran').classList.add('hidden');
            document.getElementById('skrinModPermainan').classList.add('hidden');
            document.getElementById(idSkrin).classList.remove('hidden');
        }

        function kembaliKeMenu() {
            tukarSkrin('menuPembelajaran');
            matikanModKhas();
        }

        function bukaMod(kategori) {
            modSemasa = kategori;
            indeksSemasa = 0;
            catatAktiviti(kategori);
            
            tukarSkrin('skrinModPermainan');
            document.getElementById('navigasiMod').classList.remove('hidden');
            document.getElementById('butangSeterusnyaPangil').classList.remove('hidden');

            setupButangNavigasi();
            binaKandunganMod();
        }

        function setupButangNavigasi() {
            const btnKiri = document.getElementById('btnKiri');
            const btnKanan = document.getElementById('btnKanan');

            btnKiri.onclick = () => {
                if (indeksSemasa > 0) {
                    indeksSemasa--;
                    binaKandunganMod();
                }
            };

            btnKanan.onclick = () => {
                let max = dataPembelajaran[modSemasa] ? dataPembelajaran[modSemasa].length : 1;
                if (indeksSemasa < max - 1) {
                    indeksSemasa++;
                    binaKandunganMod();
                } else {
                    cetusZarahGanjaran();
                    kembaliKeMenu();
                }
            };
        }

        function binaKandunganMod() {
            const area = document.getElementById('kandunganMod');
            area.innerHTML = '';
            
            if (dataPembelajaran[modSemasa]) {
                let item = dataPembelajaran[modSemasa][indeksSemasa];
                let subElemen = item.sub ? `<div class="text-4xl tracking-widest mt-6">${item.sub}</div>` : '';
                
                // Mainkan bunyi automatik jika ia adalah bunyi haiwan atau kenderaan
                if(item.audio) {
                    mainkanBunyiSebenar(item.audio);
                }

                area.innerHTML = `
                    <div onclick="responSentuh(this, ${item.audio ? `'${item.audio}'` : 'null'})" class="cursor-pointer p-8 rounded-full bg-white shadow-md hover:shadow-xl inline-block transform transition active:scale-95">
                        <div class="text-8xl md:text-9xl bounce-soft select-none">${item.visual}</div>
                    </div>
                    <h3 class="text-5xl font-black text-slate-700 mt-6">${item.teks}</h3>
                    ${subElemen}
                    ${item.audio ? `<p class="text-sm font-bold text-teal-600 mt-2">🔊 Sentuh gambar untuk dengar bunyi!</p>` : ''}
                `;
            } 
            else if (modSemasa === 'warna') {
                document.getElementById('butangSeterusnyaPangil').classList.add('hidden');
                const senaraiWarna = [
                    { nama: "Merah", hex: "#ef4444" },
                    { nama: "Biru", hex: "#3b82f6" },
                    { nama: "Hijau", hex: "#22c55e" },
                    { nama: "Kuning", hex: "#eab308" },
                    { nama: "Ungu", hex: "#a855f7" },
                    { nama: "Oren", hex: "#f97316" }
                ];
                
                let warnaSasaran = senaraiWarna[Math.floor(Math.random() * senaraiWarna.length)];

                area.innerHTML = `
                    <h3 class="text-3xl font-black text-slate-700 mb-6">Sentuh Warna: <span class="text-indigo-600">${warnaSasaran.nama}</span></h3>
                    <div class="grid grid-cols-3 gap-6 w-full max-w-md">
                        ${senaraiWarna.map(w => `
                            <button onclick="semakWarna('${w.nama}', '${warnaSasaran.nama}')" class="w-24 h-24 rounded-3xl shadow-lg cursor-pointer transform active:scale-90 transition-transform" style="background-color: ${w.hex}"></button>
                        `).join('')}
                    </div>
                `;
            }
            else if (modSemasa === 'tepuk') {
                document.getElementById('navigasiMod').classList.add('hidden');
                area.innerHTML = `
                    <div class="absolute inset-0 bg-sky-50/50 rounded-3xl overflow-hidden cursor-crosshair">
                        <canvas id="gameCanvas" class="w-full h-full"></canvas>
                        <button onclick="kembaliKeMenu()" class="absolute top-4 left-4 bg-gray-600/80 text-white font-bold py-2 px-4 rounded-xl text-sm z-50">🛑 Keluar</button>
                    </div>
                `;
                mulakanGameTepukBuih();
            }
        }

        function responSentuh(el, audioUrl) {
            el.classList.add('jump-active');
            setTimeout(() => el.classList.remove('jump-active'), 500);
            cetusZarahGanjaran();
            if(audioUrl) {
                mainkanBunyiSebenar(audioUrl);
            }
        }

        function semakWarna(pilihan, betul) {
            if (pilihan === betul) {
                cetusZarahGanjaran();
                setTimeout(() => binaKandunganMod(), 1000);
            }
        }

        // --- GAMEPLAY TEPUK BUIH ---
        let gameLoopId = null;
        function mulakanGameTepukBuih() {
            const canvas = document.getElementById('gameCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width || 600;
            canvas.height = rect.height || 400;

            let buihList = [];
            class Buih {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 50;
                    this.radius = Math.random() * 20 + 30;
                    this.speed = Math.random() * 2 + 1;
                    this.color = `hsla(${Math.random() * 360}, 80%, 70%, 0.6)`;
                }
                update() {
                    this.y -= this.speed;
                    if(this.y + this.radius < 0) {
                        this.y = canvas.height + this.radius;
                        this.x = Math.random() * canvas.width;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ffffff';
                    ctx.stroke();
                }
            }

            for(let i=0; i<6; i++) buihList.push(new Buih());

            function lariLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                buihList.forEach(b => { b.update(); b.draw(); });
                gameLoopId = requestAnimationFrame(lariLoop);
            }
            gameLoopId = requestAnimationFrame(lariLoop);

            canvas.addEventListener('click', function(e) {
                const cRect = canvas.getBoundingClientRect();
                const klikX = e.clientX - cRect.left;
                const klikY = e.clientY - cRect.top;

                buihList.forEach((b, indeks) => {
                    let jarak = Math.hypot(b.x - klikX, b.y - klikY);
                    if(jarak < b.radius) {
                        buihList[indeks] = new Buih();
                        cetusZarahGanjaran(e.clientX, e.clientY);
                    }
                });
            });
        }

        function matikanModKhas() {
            if(gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
            if(audioSemasa) { audioSemasa.pause(); }
        }

        // --- EFEK KANVAS CONFETTI ---
        const canvasGanjaran = document.getElementById('rewardCanvas');
        const ctxGanjaran = canvasGanjaran.getContext('2d');
        let senaraiZarah = [];

        function setSaizCanvasGanjaran() {
            canvasGanjaran.width = window.innerWidth;
            canvasGanjaran.height = window.innerHeight;
        }
        window.addEventListener('resize', setSaizCanvasGanjaran);
        setSaizCanvasGanjaran();

        class Zarah {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 10 + 6;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -6 - 2;
                this.gravity = 0.2;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.alpha = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }
            draw() {
                ctxGanjaran.save();
                ctxGanjaran.globalAlpha = this.alpha;
                ctxGanjaran.fillStyle = this.color;
                ctxGanjaran.beginPath();
                ctxGanjaran.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxGanjaran.fill();
                ctxGanjaran.restore();
            }
        }

        function cetusZarahGanjaran(x, y) {
            let pX = x || window.innerWidth / 2;
            let pY = y || window.innerHeight / 2;
            for(let i=0; i<25; i++) senaraiZarah.push(new Zarah(pX, pY));
        }

        function updateAnimasiZarah() {
            ctxGanjaran.clearRect(0, 0, canvasGanjaran.width, canvasGanjaran.height);
            senaraiZarah.forEach((z, indeks) => {
                z.update();
                z.draw();
                if(z.alpha <= 0) senaraiZarah.splice(indeks, 1);
            });
            requestAnimationFrame(updateAnimasiZarah);
        }
        requestAnimationFrame(updateAnimasiZarah);
    </script>
</body>
</html>
